<app-page-header title="Your postings" subtitle="Track approval status and applicant activity.">
  <a routerLink="/company/new" class="btn btn-primary">New posting</a>
</app-page-header>

@if (loading) {
  <p>Loading postings…</p>
} @else if (!postings.length) {
  <app-empty-state title="No postings yet" message="Create your first role to start recruiting." />
} @else {
  <table class="data-table">
    <thead>
      <tr>
        <th>Role</th>
        <th>Deadline</th>
        <th>Status</th>
        <th>Applications</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (p of postings; track p.id) {
        <tr>
          <td><strong>{{ p.title }}</strong></td>
          <td>{{ p.deadline }}</td>
          <td><app-status-chip [status]="p.status" /></td>
          <td>{{ p.applicationCount }}</td>
          <td class="row-actions">
            <a [routerLink]="['/company/postings', p.id]">View</a>
            @if (p.status === 'APPROVED') {
              <button class="btn btn-secondary" type="button" (click)="close(p)">Close</button>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
}

<style>
  .row-actions { display: flex; gap: 0.75rem; align-items: center; }
</style>
