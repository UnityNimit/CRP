<div class="login-page">
  <section class="login-hero">
    <h1>Campus Placement Portal</h1>
    <p>Placement workflows that stay under control.</p>
  </section>
  <section class="login-panel">
    <h2>Sign in</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@university.edu" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" />
      </div>
      @if (error) { <p class="error">{{ error }}</p> }
      <button class="btn btn-primary" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
    <footer class="demo-hint">
      Demo: admin&#64;campus.edu · hr&#64;techcorp.com · alice&#64;student.edu — password: <code>password123</code>
    </footer>
  </section>
</div>
