<app-page-header title="New posting" subtitle="Submissions start as Awaiting approval until the placement cell reviews them." />

<form [formGroup]="form" (ngSubmit)="submit()" class="form-panel">
  <div class="form-intro">
    <h3>Job details</h3>
    <p>Use short, specific descriptions. Strong postings convert better once the placement cell pushes them live.</p>
  </div>
  <div class="form-group">
    <label>Role title</label>
    <input formControlName="title" placeholder="Software Engineer" />
  </div>
  <div class="form-group">
    <label>Description</label>
    <textarea formControlName="description" rows="4"></textarea>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Minimum CGPA</label>
      <input type="number" step="0.1" formControlName="minCgpa" />
    </div>
    <div class="form-group">
      <label>Graduation year</label>
      <input type="number" formControlName="gradYear" />
    </div>
    <div class="form-group">
      <label>Deadline</label>
      <input type="date" formControlName="deadline" />
    </div>
  </div>
  <div class="form-group">
    <label>Allowed branches (comma-separated)</label>
    <input formControlName="allowedBranches" placeholder="CSE, IT, ECE" />
  </div>
  @if (error) { <p class="error">{{ error }}</p> }
  <button class="btn btn-primary" type="submit" [disabled]="form.invalid">Submit for approval</button>
</form>

<style>
  .form-panel {
    max-width: 760px;
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(8, 15, 30, 0.88));
    padding: 1.6rem;
    border-radius: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--color-border);
  }
  .form-intro {
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(148, 163, 184, 0.12);
  }
  .form-intro h3 {
    margin: 0 0 0.35rem 0;
    font-size: 1.05rem;
  }
  .form-intro p {
    margin: 0;
    color: var(--color-muted);
    line-height: 1.6;
  }
  .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  textarea { resize: vertical; }
  .error {
    color: #fecdd3;
    background: rgba(127, 29, 29, 0.22);
    border: 1px solid rgba(251, 113, 133, 0.24);
    padding: 0.85rem 1rem;
    border-radius: 14px;
  }
  @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
</style>
