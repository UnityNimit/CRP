<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-name">Campus Placement Portal</span>
      <span class="brand-role">{{ auth.role }}</span>
    </div>
    <nav>
      @for (item of navItems(); track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: item.exact }">
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>
  <div class="main">
    <header class="topbar">
      <span class="welcome">Welcome, {{ auth.displayName }}</span>
      <button class="btn btn-secondary" (click)="logout()">Sign out</button>
    </header>
    <main class="content route-enter">
      <router-outlet />
    </main>
  </div>
</div>
